version: "3.8"

services:
  app:
    build: .
    container_name: coursegame
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/local.db
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=https://desncr.ru
    volumes:
      - ./data:/app/data
